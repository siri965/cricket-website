<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.video-container{
width:90%;
max-width:1000px;
}
</style>

</head>

<body>

<div class="video-container">
<video id="video" playsinline controls></video>
</div>

<script>

const video = document.querySelector('#video')

const source =
"https://muc001.myturn1.top:8088/live/webcricwillow/playlist.m3u8?id=120375&pk=d8ef6000e1255eadad354c2b2e2829f835753dbe4fe0abc54c415c733f5efd2d36793bdf4fe119dbffa3a101d83df03f1418f115240a02dfc87c32319c52ef45"

if(Hls.isSupported()){

const hls = new Hls()

hls.loadSource(source)
hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(event,data){

const availableQualities = hls.levels.map(l => l.height)

const player = new Plyr(video,{
settings:['quality','speed','loop'],
quality:{
default:availableQualities[0],
options:availableQualities,
forced:true,
onChange:(e)=>{
hls.levels.forEach((level,index)=>{
if(level.height===e){
hls.currentLevel=index
}
})
}
}
})

})

}else{

video.src=source
const player=new Plyr(video)

}

</script>

</body>
</html>
